name: Build Check
 
on:

  push:

    branches: [ main ]
 
jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Build Docker Image

        run: |

          docker build -t canbet-app:latest .

      - name: Verify Build

        run: |

          docker images | grep canbet-app
 

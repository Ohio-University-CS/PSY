{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canBet • Settings</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap"
      rel="stylesheet">
    <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #c8c8c8;
    --panel: #f2f3f5;
    --border: #1a1a1a;
    --accent-blue: #5b8db8;
    --danger: #b84040;
    --green: #2e8a56;
    --text: #1a1a1a;
  }

  body {
    width: 100%; min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.4;
  }

  /* --- UNIFIED NAVIGATION --- */
  .topnav {
    width: 100%; height: 80px; display: flex; justify-content: space-between; align-items: center;
    padding: 0 40px; background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
    position: sticky; top: 0; z-index: 100; border-bottom: 4px solid var(--border);
  }
  .nav-left { display: flex; align-items: center; gap: 18px; height: 100%; }
  .logo { height: 44px; width: auto; }
  .brand-text { font-size: 1rem; letter-spacing: 2px; }

  .nav-right { display: flex; align-items: center; gap: 24px; }
  
  .nav-bal { 
    font-size: 0.8rem; color: var(--green); background: #fff; 
    padding: 10px 16px; border: 4px solid var(--border); 
  }
  
  .nav-back {
    font-size: 0.8rem; color: #000; text-decoration: none;
    padding: 10px 20px; border: 4px solid #000; border-radius: 8px;
    background: rgba(255,255,255,0.4); transition: 0.1s;
  }
  .nav-back:hover { background: #000; color: #fff; }

  /* --- LAYOUT --- */
  .page {
    max-width: 800px; margin: 0 auto; padding: 80px 24px 120px;
    display: flex; flex-direction: column; gap: 60px;
  }
  .section-label {
    font-size: 1rem; margin-bottom: 30px; padding-left: 16px;
    border-left: 10px solid var(--accent-blue); text-transform: uppercase;
  }

  /* --- SETTINGS PANELS --- */
  .settings-panel { 
    border: 8px solid var(--border); 
    background: var(--panel);
    box-shadow: 12px 12px 0px rgba(0,0,0,0.1);
    overflow: hidden; 
  }
  .setting-row { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 30px 40px; border-bottom: 4px solid #ddd; gap: 30px; 
  }
  .setting-row:last-child { border-bottom: none; }
  
  .setting-label { font-size: 0.8rem; text-transform: uppercase; margin-bottom: 8px; }
  .setting-sub { font-size: 0.6rem; color: #666; line-height: 1.4; }

  /* --- BUTTONS --- */
  .info-btn { 
    font-family: 'Press Start 2P', monospace; font-size: 0.8rem; 
    padding: 15px 25px; cursor: pointer; background: #fff; 
    color: var(--text); border: 4px solid var(--border); text-decoration: none;
    box-shadow: 6px 6px 0px var(--accent-blue);
  }
  .info-btn:hover { background: var(--accent-blue); color: #fff; transform: translate(-2px, -2px); }

  .danger-btn { 
    font-family: 'Press Start 2P', monospace; font-size: 0.8rem; 
    padding: 15px 25px; cursor: pointer; background: #fff; 
    color: var(--danger); border: 4px solid var(--danger);
    transition: 0.1s; text-decoration: none; display: inline-block;
  }
  .danger-btn:hover { background: var(--danger); color: white; box-shadow: 6px 6px 0px var(--border); }

  /* --- FOOTER --- */
  .page-footer {
    position: fixed; bottom: 0; width: 100%; height: 48px;
    background: #fff; border-top: 4px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; font-size: 0.7rem; z-index: 100;
  }

  @media (max-width: 768px) {
    .setting-row { flex-direction: column; align-items: flex-start; }
    .danger-btn, .info-btn { width: 100%; text-align: center; }
    .brand-text { display: none; }
  }
</style>
  </head>
  <body>

    <nav class="topnav">
      <div class="nav-left">
        <a href="{% url 'main' %}"><img
            src="{% get_static_prefix %}images/canBet%20symbol%20sym..png" class="logo"
            alt="Logo"></a>
        <span class="brand-text">canBet</span>
      </div>
      <div class="nav-right">
        <div class="nav-bal">
          {{ user.bit_balance|default:"0" }} BITS
        </div>
        <a href="{% url 'main' %}" class="nav-back">◀ BACK</a>
      </div>
    </nav>

    <div class="page">
      <section>
        <div class="section-label">Node Management</div>
        <div class="settings-panel">

          <div class="setting-row">
            <div><div class="setting-label">Privacy Manifest</div><div
                class="setting-sub">Data encryption and usage
                policies.</div></div>
            <a href="/privacy/" class="info-btn">VIEW</a>
          </div>

          <div class="setting-row">
            <div><div class="setting-label">Logout</div><div
                class="setting-sub">Disconnect safely from the
                network.</div></div>
            <a href="{% url 'logout' %}" class="danger-btn">LOGOUT</a>
          </div>

          <div class="setting-row">
            <div>
              <div class="setting-label"
                style="color:var(--danger)">DELETE ACCOUNT</div>
              <div class="setting-sub" style="color:var(--danger)">Wipe all
                credentials and assets permanently.</div>
            </div>
            <form action="{% url 'delete_account' %}" method="POST"
              onsubmit="return confirm('WARNING: THIS ACTION IS IRREVERSIBLE. PURGE ALL DATA?')">
              {% csrf_token %}
              <button type="submit" class="danger-btn"
                style="background:var(--danger); color:white;">DELETE</button>
            </form>
          </div>

        </div>
      </section>
    </div>

  </body>
</html>

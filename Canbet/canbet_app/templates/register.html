{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canBet • Register</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet">
    <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 100%;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    background-color: #c8c8c8;
    display: flex;
    flex-direction: column;
    color: #1a1a1a;
  }

  /* --- UNIFIED NAVIGATION --- */
.topnav {
  width: 100%; 
  height: 80px; /* Fixed height for consistency */
  display: flex; 
  justify-content: space-between; 
  align-items: center;
  padding: 0 40px; 
  background: rgba(255, 255, 255, 0.15); 
  backdrop-filter: blur(4px);
  position: sticky; 
  top: 0; 
  z-index: 100; 
  border-bottom: 4px solid var(--border);
}

.nav-left { 
  display: flex; 
  align-items: center; 
  gap: 18px; 
  height: 100%;
}

.logo { 
  height: 44px; /* Standardized logo height */
  width: auto; 
}

.brand-text { 
  font-size: 1rem; 
  letter-spacing: 2px; 
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 24px;
}

.nav-back {
  font-size: 0.8rem; 
  color: #000; 
  text-decoration: none;
  padding: 10px 20px; 
  border: 4px solid #000; 
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.4); 
  transition: 0.1s;
}

.nav-back:hover { 
  background: #000; 
  color: #fff; 
}

/* Standardized Balance Display for Shop/Main */
.nav-bal { 
  font-size: 0.8rem; 
  color: var(--green); 
  background: #fff; 
  padding: 10px 16px; 
  border: 4px solid var(--border); 
}

  /* --- REGISTER BOX --- */
  .container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .auth-card {
    width: 100%;
    max-width: 500px;
    background: #f2f3f5;
    border: 6px solid #1a1a1a;
    padding: 40px;
    box-shadow: 12px 12px 0px rgba(0,0,0,0.2);
  }

  .auth-title {
    font-size: 1.4rem;
    margin-bottom: 30px;
    text-align: center;
    text-transform: uppercase;
    border-bottom: 4px solid #1a1a1a;
    padding-bottom: 15px;
  }

  .form-group { margin-bottom: 25px; }

  .form-group label {
    display: block;
    font-size: 0.6rem;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .form-group input {
    width: 100%;
    padding: 15px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.7rem;
    border: 4px solid #1a1a1a;
    background: #fff;
    outline: none;
  }

  .form-group input:focus { background: #eefbff; }

  /* Error Message */
  .error-msg {
    background: #ffdbdb;
    color: #d32f2f;
    border: 3px solid #d32f2f;
    padding: 15px;
    font-size: 0.55rem;
    margin-bottom: 25px;
    line-height: 1.6;
  }

  .btn-submit {
    width: 100%;
    padding: 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.8rem;
    background: #1a1a1a;
    color: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 0 #555;
    transition: all 0.1s;
  }

  .btn-submit:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #555;
  }

  .auth-footer {
    margin-top: 30px;
    text-align: center;
    font-size: 0.55rem;
  }

  .auth-footer a { color: #5b8db8; text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
</style>
  </head>
  <body>

    <nav class="topnav">
      <div class="nav-left">
        <a href="{% url 'home' %}"><img
            src="{% static 'images/canBet symbol sym..png' %}" class="logo"
            alt="Logo"></a>
        <span class="brand-text">canBet</span>
      </div>
    </nav>

    <main class="container">
      <div class="auth-card">
        <h1 class="auth-title">Register</h1>

        {% if error %}
        <div class="error-msg">
          !! ERROR: {{ error }}
        </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" value="{{ username|default:'' }}"
              required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" value="{{ email|default:'' }}"
              required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm" required>
          </div>

          <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
        </form>

        <div class="auth-footer">
          Already have an account? <br><br>
          <a href="{% url 'login' %}">Log In Here</a>
        </div>
      </div>
    </main>

  </body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canBet — Crates</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#d0d3d7; --panel:#f2f3f5; --panel2:#e8eaed;
  --border:#b4bac2; --border-dark:#8a9199;
  --accent:#2e3c4e; --accent2:#5b8db8;
  --text:#18222e; --text-dim:#7a8694;
  --green:#2e8a56; --shadow:rgba(30,45,60,0.13); --shine:rgba(255,255,255,0.7);
}
html { scroll-behavior:smooth; }
body { width:100vw; min-height:100vh; font-family:'Press Start 2P',monospace; background:var(--bg); background-image:radial-gradient(ellipse at 15% 10%,#e8ecf0 0%,transparent 55%),radial-gradient(ellipse at 85% 90%,#c4c9cf 0%,transparent 55%); overflow-x:hidden; }
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:3px}
.topnav { position:sticky; top:0; height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; background:rgba(242,243,245,0.92); border-bottom:1px solid var(--border); box-shadow:0 2px 16px var(--shadow); backdrop-filter:blur(12px); z-index:100; }
.nav-back { font-size:0.32rem; color:var(--text-dim); letter-spacing:1.5px; text-decoration:none; transition:color 0.2s; }
.nav-back:hover { color:var(--accent2); }
.page { max-width:760px; margin:0 auto; padding:48px 24px 60px; display:flex; flex-direction:column; gap:40px; }
.section-label { font-size:0.3rem; color:var(--text-dim); letter-spacing:3px; margin-bottom:14px; padding-left:10px; border-left:2px solid var(--accent2); }
.crates-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
.crate-card { background:var(--panel); border:1px solid var(--border); box-shadow:0 2px 12px var(--shadow),inset 0 1px 0 var(--shine); padding:28px 20px 20px; display:flex; flex-direction:column; align-items:center; gap:14px; cursor:pointer; position:relative; transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s; }
.crate-card:hover:not(.locked) { border-color:var(--accent2); transform:translateY(-3px); box-shadow:0 8px 24px rgba(30,45,60,0.18),inset 0 1px 0 var(--shine); }
.crate-card.locked { cursor:not-allowed; opacity:0.55; }
.crate-img { width:80px; height:80px; image-rendering:pixelated; object-fit:contain; }
.crate-emoji { font-size:3.2rem; line-height:1; }
.crate-name { font-size:0.38rem; color:var(--text); letter-spacing:1px; text-align:center; line-height:2; }
.crate-desc { font-size:0.26rem; color:var(--text-dim); letter-spacing:1px; text-align:center; line-height:2; }
.crate-price { font-size:0.32rem; color:var(--green); letter-spacing:1px; padding:6px 14px; border:1px solid var(--border); background:var(--panel2); }
.crate-price.locked-price { color:var(--text-dim); }
.crate-badge { position:absolute; top:8px; right:8px; font-size:0.24rem; letter-spacing:1px; padding:4px 8px; color:white; }
.badge-soon { background:var(--border-dark); }
.badge-new  { background:var(--accent2); }
.result-feed { border:1px solid var(--border); box-shadow:0 2px 10px var(--shadow); overflow-y:auto; max-height:400px; }
.result-row { display:flex; align-items:center; gap:14px; padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--border); transition:background 0.15s; }
.result-row:last-child { border-bottom:none; }
.result-rarity { font-size:0.28rem; letter-spacing:1px; width:90px; flex-shrink:0; }
.result-item { font-size:0.3rem; color:var(--text); letter-spacing:0.8px; flex:1; line-height:1.8; display:flex; align-items:center; gap:8px; }
.result-time { font-size:0.25rem; color:var(--text-dim); letter-spacing:1px; }
.overlay { position:fixed; inset:0; background:rgba(24,34,46,0.6); display:none; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(4px); }
.overlay.show { display:flex; }
.popup { background:var(--panel); border:1px solid var(--border); box-shadow:0 16px 48px rgba(30,45,60,0.3),inset 0 1px 0 var(--shine); padding:40px 48px; text-align:center; display:flex; flex-direction:column; gap:16px; min-width:300px; }
.popup-icon { display:flex; align-items:center; justify-content:center; height:96px; }
.popup-icon img { width:96px; height:96px; image-rendering:pixelated; object-fit:contain; }
.popup-rarity { font-size:0.5rem; letter-spacing:2px; }
.popup-name { font-size:0.38rem; color:var(--text); letter-spacing:1px; line-height:2; }
.popup-btn { font-family:'Press Start 2P',monospace; font-size:0.38rem; background:var(--accent); color:white; border:none; padding:14px 28px; cursor:pointer; letter-spacing:1px; margin-top:8px; transition:background 0.2s; }
.popup-btn:hover { background:var(--accent2); }
.item-sprite { width:40px; height:40px; image-rendering:pixelated; object-fit:contain; flex-shrink:0; }
.page-footer { position:fixed; bottom:0; left:0; right:0; height:28px; display:flex; align-items:center; justify-content:space-between; padding:0 28px; background:rgba(242,243,245,0.92); border-top:1px solid var(--border); backdrop-filter:blur(8px); z-index:100; }
.footer-text { font-size:0.26rem; color:var(--text-dim); letter-spacing:1.5px; }
.status-right { display:flex; align-items:center; gap:7px; }
.status-dot { width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
</style>
</head>
<body>
<nav class="topnav">
  <a href="/main/"><img src="{% static 'images/canBet symbol sym..png' %}" class="logo" alt="Logo"></a>
  <a href="/main/" class="nav-back">◀ Menu</a>
</nav>
<div class="page">
  <section>
    <div class="section-label">Buy Crates</div>
    <div class="crates-grid" id="cratesToBuy"></div>
  </section>

  <section>
    <div class="section-label">Open Crates</div>
    <div class="crates-grid" id="cratesToOpen"></div>
  </section>

<div class="overlay" id="overlay">
  <div class="popup">
    <div class="popup-icon"><img id="pIcon" src="" alt=""></div>
    <div class="popup-rarity" id="pRarity"></div>
    <div class="popup-name" id="pName"></div>
    <button class="popup-btn" onclick="closePopup()">Collect</button>
  </div>
</div>

<footer class="page-footer">
  <span class="footer-text">CANBET v1.0 — CRATES</span>
  <div class="status-right"><span class="footer-text">ONLINE</span><div class="status-dot"></div></div>
</footer>

<script>
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] ?? '';

const RARITY_COLORS = {
  COMMON: '#2e8a56', RARE: '#5b8db8', EPIC: '#a855f7', LEGENDARY: '#c8943a'
};

const CRATE_EMOJIS = {
  SPOOKY: '👻',
  SPACE: '🌌',
  FANTASY: '🏰',
  WEATHER: '⛈️',
};

// Load lootboxes and user inventory on page load
async function loadLootboxes() {
  try {
    const resp = await fetch('/api/lootboxes/');
    const lootboxes = await resp.json();
    
    const buyGrid = document.getElementById('cratesToBuy');
    const openGrid = document.getElementById('cratesToOpen');
    
    // Always populate buy grid (create or update)
    lootboxes.forEach(lb => {
      let buyCard = document.getElementById(`buy-crate-${lb.id}`);
      
      if (!buyCard) {
        // Create new buy card
        buyCard = document.createElement('div');
        buyCard.className = 'crate-card';
        buyCard.id = `buy-crate-${lb.id}`;
        buyCard.innerHTML = `
          <img src="/static/${lb.sprite_path}" class="crate-img" alt="${lb.name}" onerror="this.replaceWith(createEmojiDiv('${lb.crate_type}'))">
          <div class="crate-name">${lb.name}</div>
          <div class="crate-price">${lb.cost_bits} Bits</div>
          <button class="popup-btn" style="width:100%;margin-top:6px" onclick="buyLootbox(${lb.id}, '${lb.name}')">Buy</button>
        `;
        buyGrid.appendChild(buyCard);
      }
    });
    
    // Update or create open grid cards
    const ownedCrates = lootboxes.filter(lb => lb.quantity > 0);
    const openGridSection = document.querySelector('section:has(#cratesToOpen)');
    
    // Always show the section
    openGridSection.style.display = 'block';
    
    if (ownedCrates.length === 0) {
      // Show empty message if no crates are owned
      if (openGrid.children.length === 0 || !openGrid.querySelector('.empty-message')) {
        openGrid.innerHTML = '<div class="empty-message" style="grid-column:1/-1;padding:20px;text-align:center;color:var(--text-dim)">No crates owned</div>';
      }
    } else {
      // Clear empty message if exists
      const emptyMsg = openGrid.querySelector('.empty-message');
      if (emptyMsg) emptyMsg.remove();
    }
    
    ownedCrates.forEach(lb => {
      const existingCard = document.getElementById(`crate-${lb.id}`);
      const btnDisabled = lb.quantity > 0 ? '' : 'disabled';
      const btnText = lb.quantity > 0 ? `Open (${lb.quantity}x)` : 'Locked';
      
      if (existingCard) {
        // Update existing card
        const quantityEl = existingCard.querySelector('.crate-price');
        const btnEl = existingCard.querySelector('.popup-btn');
        
        quantityEl.textContent = `${lb.quantity}x owned`;
        btnEl.textContent = btnText;
        btnEl.disabled = lb.quantity === 0;
        
        // Update card class for styling
        if (lb.quantity > 0 && existingCard.classList.contains('locked')) {
          existingCard.classList.remove('locked');
        } else if (lb.quantity === 0 && !existingCard.classList.contains('locked')) {
          existingCard.classList.add('locked');
        }
      } else {
        // Create new card
        const openCard = document.createElement('div');
        openCard.className = 'crate-card';
        openCard.id = `crate-${lb.id}`;
        openCard.innerHTML = `
          <img src="/static/${lb.sprite_path}" class="crate-img" alt="${lb.name}" onerror="this.replaceWith(createEmojiDiv('${lb.crate_type}'))">
          <div class="crate-name">${lb.name}</div>
          <div class="crate-price">${lb.quantity}x owned</div>
          <button class="popup-btn" style="width:100%;margin-top:6px" onclick="openLootbox('${lb.crate_type}')" ${btnDisabled}>${btnText}</button>
        `;
        openGrid.appendChild(openCard);
      }
    });
  } catch (err) {
    console.error('Failed to load lootboxes:', err);
  }
}

function createEmojiDiv(crateType) {
  const div = document.createElement('div');
  div.className = 'crate-emoji';
  div.textContent = CRATE_EMOJIS[crateType] || '📦';
  return div;
}

async function buyLootbox(lootboxId, lootboxName) {
  const resp = await fetch('/api/lootbox/buy/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
    body: JSON.stringify({ lootbox_id: lootboxId })
  });
  const data = await resp.json();
  if (!resp.ok) {
    alert(data.error || 'Could not purchase crate.');
    return;
  }
  alert(`✓ Successfully purchased ${lootboxName}!`);
  loadLootboxes(); // Refresh the display
}

async function openLootbox(crateType) {
  const resp = await fetch('/api/crate/open/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
    body: JSON.stringify({ crate_type: crateType })
  });
  const data = await resp.json();
  if (!resp.ok) {
    alert(data.error || 'Could not open crate.');
    return;
  }
  const item = data.item;
  const color = RARITY_COLORS[item.rarity] || '#999';

  // Show popup
  const icon = document.getElementById('pIcon');
  icon.src = '/static/' + item.sprite_path;
  icon.alt = item.name;
  document.getElementById('pRarity').textContent = item.rarity;
  document.getElementById('pRarity').style.color = color;
  document.getElementById('pName').textContent = item.name;
  document.getElementById('overlay').classList.add('show');

  // Refresh crates after opening completes
  document.querySelector('.popup-btn').addEventListener('click', loadLootboxes, { once: true });
}

// Load recent opens from API on page load
let lastSeenOpenId = null;

fetch('/api/recent-opens/')
  .then(r => r.json())
  .then(opens => {
    if (!opens.length) return;
    const feed = document.createElement('div');
    feed.className = 'result-feed';
    feed.id = 'feed';
    opens.forEach(o => {
      const row = document.createElement('div');
      row.className = 'result-row';
      row.dataset.openId = o.id;
      const color = RARITY_COLORS[o.rarity] || '#999';
      row.innerHTML = `
        <span class="result-rarity" style="color:${color}">${o.rarity}</span>
        <span class="result-item"><img src="/static/${o.sprite_path}" class="item-sprite" alt="${o.item}">${o.item}</span>
        <span class="result-time">${new Date(o.opened_at).toLocaleTimeString()}</span>
      `;
      feed.appendChild(row);
    });
    if (opens.length > 0) {
      lastSeenOpenId = opens[0].id;
    }
    const page = document.querySelector('.page');
    const section = document.createElement('section');
    section.innerHTML = '<div class="section-label">Recent Opens</div>';
    section.appendChild(feed);
    page.appendChild(section);
  });

function closePopup() { document.getElementById('overlay').classList.remove('show'); }

// Load on page load
loadLootboxes();

// Poll for updates every 2 seconds
setInterval(loadLootboxes, 2000);

// Poll for recent opens every 3 seconds - only add truly new opens
setInterval(() => {
  fetch('/api/recent-opens/')
    .then(r => r.json())
    .then(opens => {
      if (!opens.length) return;
      const feed = document.getElementById('feed');
      if (!feed) return;
      
      // Process opens from newest to oldest, stopping when we find one we've already shown
      let addedAny = false;
      for (let i = 0; i < opens.length; i++) {
        const o = opens[i];
        // If this is the last one we saw, stop - everything else is old
        if (lastSeenOpenId !== null && o.id === lastSeenOpenId) {
          break;
        }
        // This is a new open we haven't shown yet
        const row = document.createElement('div');
        row.className = 'result-row';
        row.dataset.openId = o.id;
        const color = RARITY_COLORS[o.rarity] || '#999';
        row.innerHTML = `
          <span class="result-rarity" style="color:${color}">${o.rarity}</span>
          <span class="result-item"><img src="/static/${o.sprite_path}" class="item-sprite" alt="${o.item}">${o.item}</span>
          <span class="result-time">${new Date(o.opened_at).toLocaleTimeString()}</span>
        `;
        feed.appendChild(row);
        if (!addedAny) {
          lastSeenOpenId = o.id;
          addedAny = true;
        }
      }
      
      // Keep only the most recent 50 rows to prevent feed from growing too large
      while (feed.children.length > 50) {
        feed.removeChild(feed.firstChild);
      }
    });
}, 3000);
</script>
</body>
</html>

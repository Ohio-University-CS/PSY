{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canBet — Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet">
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 100vw; height: 100vh; overflow: hidden;
  font-family: 'Press Start 2P', monospace;
  background-color: #c8c8c8;
  background-image: url("{% static 'images/loginbg.png' %}");
  background-position: center; background-repeat: no-repeat; background-size: cover;
  image-rendering: pixelated; display: flex; flex-direction: column; position: relative;
}
.topnav {
  width: 100%; display: flex; justify-content: flex-start; align-items: center;
  padding: 12px 24px; background: rgba(255,255,255,0.6);
  border-bottom: 1px solid #ccc; position: relative; z-index: 10;
}
.page-content {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(208,208,208,0.85); padding: 2rem; gap: 2rem; backdrop-filter: blur(4px);
}
.form-group {
  display: flex; flex-direction: column; align-items: center;
  gap: 0.6rem; width: 100%; max-width: 360px;
}
.form-label { font-size: 0.75rem; color: #333; letter-spacing: 1px; align-self: flex-start; }
.form-input {
  width: 100%; height: 36px; background: #888; border: none; outline: none;
  padding: 4px 10px; font-family: 'Press Start 2P', monospace; font-size: 0.6rem; color: #eee;
}
.form-input:focus { background: #999; }
.login-btn {
  cursor: pointer; background: #4a8a60; color: #fff; transition: background 0.2s;
  width: 100%; height: 36px; border: none; font-family: 'Press Start 2P', monospace;
  font-size: 0.6rem; letter-spacing: 1px;
}
.login-btn:hover { background: #3a7a50; }
.error-msg {
  font-size: 0.55rem; color: #b84040; letter-spacing: 1px; text-align: center;
  background: rgba(184,64,64,0.1); padding: 8px 16px; border: 1px solid #d47070;
}
.bottom-links { display: flex; gap: 20px; align-items: center; }
</style>
  </head>
  <body>
    <nav class="topnav">
      <a href="/"><img src="{% static 'images/canBet symbol sym..png' %}"
          class="logo" alt="Logo"></a>
    </nav>
    <div class="page-content">
      <form method="POST" action="/login/" style="display:contents;">
        {% csrf_token %}
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <div class="form-group">
          <label class="form-label" for="email-input">Email</label>
          <input id="email-input" name="email" type="email" class="form-input"
            placeholder="yourname@school.edu" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password-input">Password</label>
          <input id="password-input" name="password" type="password"
            class="form-input" placeholder="************" required>
        </div>
        <div class="form-group">
          <button type="submit" class="login-btn">Login</button>
        </div>
      </form>
      <div class="bottom-links">
        <span style="font-size:0.55rem;color:#555;letter-spacing:1px;">
          No account? <a href="/register/"
            style="color:#4a8a60;text-decoration:none;">Register</a>
        </span>
        <span style="font-size:0.55rem;color:#888;">|</span>
        <a href="/privacy/"
          style="font-size:0.55rem;color:#555;letter-spacing:1px;text-decoration:none;">Privacy</a>
      </div>
    </div>
  </body>
</html>

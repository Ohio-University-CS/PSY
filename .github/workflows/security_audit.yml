name: Security Audit

on:
  push:
    branches: [main, canvas_adjust]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Run Django Security Tests
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ci-insecure-key-for-testing-only
      DEBUG: "False"
      DATABASE_URL: sqlite:///./test_db.sqlite3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Canbet/requirements.txt

      - name: Install dependencies
        working-directory: Canbet
        run: pip install -r requirements.txt

      - name: Run security audit tests
        working-directory: Canbet
        run: |
          python manage.py test canbet_app.test_security_audit \
            --verbosity=2 \
            --settings=Canbet.settings

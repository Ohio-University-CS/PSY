name: Security Audit
 
on:
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday
  push:
    branches: [ main ]
 
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Safety
        run: pip install safety
      - name: Check Dependencies
        run: safety check
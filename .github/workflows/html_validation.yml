name: HTML Validation
 
on: [push, pull_request]
 
jobs:

  html-validation:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Check HTML syntax

        run: |

          sudo apt-get install -y tidy

          find . -name "*.html" -not -path "./venv/*" -exec tidy -e -q {} +
 

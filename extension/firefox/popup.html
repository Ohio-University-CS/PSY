<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>canBet</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="brand">
        <img src="icons/canbet.png" alt="" class="logo">
        <div>
          <h1>canBet</h1>
          <p>Bits balance</p>
        </div>
      </header>

      <section class="balance-card">
        <div class="label">Your Bits</div>
        <div class="bits" id="bitsValue">Loading...</div>

      <a class="spend-link" href="https://www.canbet.live/" target="_blank" rel="noreferrer">
        Spend Bits
      </a>
    </main>
    <script src="popup.js"></script>
